<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>NEO TAROT</title>
    <style>
        /* =========================================
           全局样式 (Global Styles)
           ========================================= */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; position: fixed; background-color: #000; font-family: 'Times New Roman', 'Songti SC', 'SimSun', serif; -webkit-tap-highlight-color: transparent; overscroll-behavior: none; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        body { cursor: default; }
        body.can-grab { cursor: grab; }
        body.is-grabbing { cursor: grabbing; }

        /* =========================================
           初始界面 (Start Screen)
           ========================================= */
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; background: radial-gradient(circle at center, rgba(0, 0, 0, 0.4) 0%, rgba(0, 0, 0, 0.95) 90%); display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 1.5s cubic-bezier(0.25, 1, 0.5, 1); color: #d4af37; padding: 20px; box-sizing: border-box; }
        .title-group { text-align: center; margin-bottom: 2vh; position: relative; animation: floatTitle 6s ease-in-out infinite; }
        h1 { font-size: 72px; margin: 0; letter-spacing: 20px; font-weight: 800; background: linear-gradient(135deg, #fff 0%, #d4af37 50%, #996515 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.4)); position: relative; }
        h2 { font-size: 14px; font-weight: 400; letter-spacing: 8px; color: #a0a0a0; margin-top: 15px; text-transform: uppercase; opacity: 0.8; border-top: 1px solid rgba(212, 175, 55, 0.3); display: inline-block; padding-top: 15px; width: 120%; margin-left: -10%; }
        @keyframes floatTitle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* --- API 配置面板样式 --- */
        .api-config-panel { background: rgba(10, 10, 10, 0.8); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 12px; padding: 18px 22px; width: 90%; max-width: 420px; margin-bottom: 2vh; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); opacity: 0; animation: fadeUp 1s ease-out 0.4s forwards; }
        .api-config-title { font-size: 11px; letter-spacing: 3px; color: #d4af37; text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .api-provider-select { width: 100%; padding: 10px 12px; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 8px; color: #fff; font-family: inherit; font-size: 12px; cursor: pointer; margin-bottom: 10px; outline: none; transition: border-color 0.3s; box-sizing: border-box; }
        .api-provider-select:focus { border-color: #d4af37; }
        .api-provider-select option { background: #1a1a1a; color: #fff; }
        .api-key-input { width: 100%; padding: 10px 12px; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 8px; color: #d4af37; font-family: inherit; font-size: 12px; outline: none; transition: border-color 0.3s; box-sizing: border-box; }
        .api-key-input:focus { border-color: #d4af37; }
        .api-key-input::placeholder { color: rgba(255, 255, 255, 0.3); font-size: 11px; }
        .api-status { font-size: 10px; color: #888; margin-top: 8px; text-align: center; min-height: 14px; }
        .api-status.connected { color: #4CAF50; }
        .api-status.error { color: #ff6b6b; }
        .skip-api-btn { background: transparent; border: none; color: #666; font-size: 10px; cursor: pointer; margin-top: 8px; text-decoration: underline; font-family: inherit; }
        .skip-api-btn:hover { color: #999; }

        /* Options Grid / 选项按钮网格 */
        .options-container { display: flex; flex-direction: column; gap: 20px; margin-bottom: 2vh; text-align: center; opacity: 0; animation: fadeUp 1s ease-out 0.6s forwards; }
        .options-row { display: flex; flex-direction: row; gap: 40px; justify-content: center; flex-wrap: wrap; }
        .option-group { display: flex; flex-direction: column; gap: 12px; align-items: center; }
        .option-label { font-size: 11px; letter-spacing: 3px; color: #666; text-transform: uppercase; margin-bottom: 5px; font-weight: 600; }
        .choice-btn { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(212, 175, 55, 0.3); color: #888; padding: 10px 0; width: 140px; font-family: inherit; font-size: 11px; cursor: pointer; transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); border-radius: 50px; position: relative; overflow: hidden; backdrop-filter: blur(2px); }
        .choice-btn.active { border-color: #d4af37; color: #fff; background: rgba(212, 175, 55, 0.15); box-shadow: 0 0 25px rgba(212, 175, 55, 0.15); }
        .choice-btn:hover { border-color: #fff; color: #fff; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5); }

        #enter-btn { background: transparent; color: #d4af37; border: 1px solid #d4af37; padding: 14px 60px; font-size: 14px; letter-spacing: 6px; cursor: pointer; font-family: inherit; font-weight: 600; border-radius: 50px; transition: all 0.5s; position: relative; overflow: hidden; opacity: 0; animation: fadeUp 1s ease-out 0.8s forwards; }
        #enter-btn::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.2), transparent); transition: 0.5s; }
        #enter-btn:hover::before { left: 100%; transition: 0.7s; }
        #enter-btn:hover { background: #d4af37; color: #000; box-shadow: 0 0 40px rgba(212, 175, 55, 0.4); transform: scale(1.05); letter-spacing: 8px; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Mystical Sparkles / 神秘学闪光粒子 */
        .sparkle { position: absolute; background: white; border-radius: 50%; pointer-events: none; opacity: 0; box-shadow: 0 0 10px #d4af37, 0 0 20px #d4af37; animation: sparkleFloat linear forwards; }
        @keyframes sparkleFloat { 0% { opacity: 0; transform: translateY(0) scale(0); } 50% { opacity: 1; transform: translateY(-50px) scale(1); } 100% { opacity: 0; transform: translateY(-100px) scale(0); } }

        /* =========================================
           输入界面美化
           ========================================= */
        #input-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 90; background: rgba(0, 0, 0, 0.4); display: flex; justify-content: center; align-items: center; opacity: 0; transition: opacity 1.0s; backdrop-filter: blur(0px); }
        .input-card { width: 90%; max-width: 400px; padding: 40px 30px; background: rgba(10, 10, 10, 0.6); border: 1px solid rgba(212, 175, 55, 0.2); box-shadow: 0 0 50px rgba(0, 0, 0, 0.8); border-radius: 6px; display: flex; flex-direction: column; align-items: center; text-align: center; position: relative; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        .input-decoration { color: #d4af37; font-size: 20px; margin-bottom: 15px; opacity: 0.8; animation: pulse 2s infinite; }
        #input-prompt { font-family: 'Times New Roman', serif; color: #fff; font-size: 16px; letter-spacing: 6px; font-weight: 400; margin: 0 0 30px 0; text-transform: uppercase; text-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }
        #user-question { width: 100%; background: transparent; border: none; border-bottom: 1px solid rgba(212, 175, 55, 0.3); color: #d4af37; font-family: 'Times New Roman', serif; font-size: 20px; text-align: center; padding: 10px 0; margin-bottom: 40px; outline: none; resize: none; border-radius: 0; transition: border-color 0.3s; }
        #user-question:focus { border-bottom-color: #d4af37; }
        #user-question::placeholder { color: rgba(255, 255, 255, 0.2); font-size: 14px; letter-spacing: 2px; font-style: italic; }
        #confirm-question-btn { background: transparent; color: #d4af37; border: 1px solid rgba(212, 175, 55, 0.4); padding: 12px 50px; font-size: 12px; letter-spacing: 4px; border-radius: 50px; cursor: pointer; font-family: inherit; transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1); }
        #confirm-question-btn:hover { background: rgba(212, 175, 55, 0.1); border-color: #d4af37; box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); transform: scale(1.05); }

        /* =========================================
           游戏内 UI 层
           ========================================= */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; pointer-events: none; color: #d4af37; opacity: 0; transition: opacity 1.5s; }
        #axis-markers { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 2px; height: 100%; z-index: 5; pointer-events: none; opacity: 0.4; }
        #axis-markers::before { content: ''; position: absolute; top: 20%; left: 50%; transform: translateX(-50%); width: 1px; height: 30px; background: linear-gradient(to bottom, transparent, #ccd437); }
        #axis-markers::after { content: ''; position: absolute; top: calc(20% + 35px); left: 50%; transform: translateX(-50%) rotate(45deg); width: 4px; height: 4px; border: 1px solid #ccd437; background: transparent; opacity: 0.6; }
        .bottom-marker { position: absolute; bottom: 12%; left: 50%; transform: translateX(-50%); width: 100%; height: 100%; }
        .bottom-marker::before { content: ''; position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%); width: 1px; height: 30px; background: linear-gradient(to top, transparent, #ccd437); }
        .bottom-marker::after { content: ''; position: absolute; bottom: calc(20% + 35px); left: 50%; transform: translateX(-50%) rotate(45deg); width: 4px; height: 4px; border: 1px solid #ccd437; background: transparent; opacity: 0.6; }

        #history-container { position: absolute; top: 20px; right: 20px; display: flex; flex-direction: row; gap: 15px; pointer-events: auto; z-index: 30; height: 100px; align-items: flex-start; transition: opacity 1s ease; }
        .history-slot { width: 50px; height: 85px; background: #fff; border: 2px solid #d4af37; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.8); flex-shrink: 0; position: relative; animation: slotEnter 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
        @keyframes slotEnter { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .history-slot img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .history-info { position: relative; z-index: 2; width: 100%; background: rgba(0, 0, 0, 0.8); text-align: center; padding: 2px 0; border-top: 1px solid #d4af37; }
        .history-name { font-size: 8px; color: #d4af37; font-weight: 700; white-space: nowrap; transform: scale(0.9); }
        .history-rev { font-size: 7px; color: #ff3333; display: none; font-weight: bold; background: rgba(0, 0, 0, 0.5); width: 100%; }
        .is-reversed img { transform: rotate(180deg); }
        .is-reversed .history-rev { display: block; }

        #hud-center { position: absolute; bottom: 8%; left: 50%; transform: translateX(-50%); text-align: center; color: #d4af37; pointer-events: none; width: 100%; background: transparent; border-radius: 0; }
        #gesture-icon { font-size: 32px; display: block; margin-bottom: 10px; opacity: 0.9; text-shadow: 0 0 15px #d4af37; }
        #status-text { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; font-weight: 600; opacity: 0.8; }

        #final-text-container { position: absolute; top: 65%; left: 0; width: 100%; text-align: center; opacity: 0; transition: opacity 2s; pointer-events: none; display: flex; justify-content: center; gap: 120px; flex-wrap: wrap; padding: 0 20px; box-sizing: border-box; }
        .final-card-label { display: flex; flex-direction: column; width: 220px; color: #fff; text-shadow: 0 0 10px #d4af37; text-align: center; animation: textFloat 3s ease-in-out infinite alternate; margin-bottom: 20px; }
        @keyframes textFloat { from { transform: translateY(0); } to { transform: translateY(-5px); } }
        .final-name { font-size: 15px; font-weight: bold; color: #d4af37; margin-bottom: 8px; border-bottom: 1px solid rgba(212, 175, 55, 0.3); padding-bottom: 5px; }
        .final-meaning { font-size: 11px; color: #ccc; font-style: italic; line-height: 1.5; opacity: 0.8; }

        #end-ui { position: absolute; bottom: 12%; left: 0; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 1.5s; z-index: 50; gap: 20px; }
        #restart-btn { background: rgba(0, 0, 0, 0.7); border: 1px solid #d4af37; color: #d4af37; padding: 12px 50px; font-size: 13px; letter-spacing: 4px; border-radius: 50px; cursor: pointer; font-family: inherit; transition: 0.4s; backdrop-filter: blur(5px); }
        #restart-btn:hover { background: #d4af37; color: #000; box-shadow: 0 0 25px rgba(212, 175, 55, 0.6); }
        #view-reading-btn { background: #d4af37; color: #000; border: 1px solid #d4af37; padding: 15px 60px; font-size: 14px; letter-spacing: 4px; border-radius: 50px; cursor: pointer; font-family: inherit; font-weight: bold; transition: 0.4s; box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }
        #view-reading-btn:hover { transform: scale(1.05); box-shadow: 0 0 40px rgba(212, 175, 55, 0.8); }

        #oracle-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; max-width: 700px; text-align: center; color: #fff; font-size: 18px; line-height: 2.0; font-family: 'Noto Serif SC', serif; text-shadow: 0 0 10px #d4af37; z-index: 60; pointer-events: none; opacity: 1; }

        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
        #credits { position: absolute; bottom: 20px; right: 25px; text-align: right; color: #a0a0a0; font-size: 10px; line-height: 1.6; opacity: 0; transition: opacity 1.5s; pointer-events: none; z-index: 50; font-family: 'Noto Serif SC', serif; letter-spacing: 1px; }
        #video-feed { position: absolute; bottom: 10px; right: 10px; width: 100px; opacity: 0; transform: scaleX(-1); pointer-events: none; border: 1px solid #d4af37; transition: opacity 0.5s; }
        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #d4af37; letter-spacing: 6px; font-size: 12px; font-weight: bold; z-index: 200; }

        #music-control { position: absolute; top: 20px; left: 20px; width: 40px; height: 40px; border: 1px solid #d4af37; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 200; background: rgba(0, 0, 0, 0.6); transition: all 0.3s; opacity: 0.7; }
        #music-control:hover { opacity: 1; box-shadow: 0 0 10px #d4af37; transform: scale(1.1); }
        .music-icon { font-size: 20px; user-select: none; animation: rotateMusic 4s linear infinite; }
        .music-line { position: absolute; width: 80%; height: 2px; background: #ff3333; transform: rotate(45deg) scale(0); transition: transform 0.3s; }
        #music-control.muted .music-icon { animation-play-state: paused; opacity: 0.5; }
        #music-control.muted .music-line { transform: rotate(45deg) scale(1); }

        @keyframes rotateMusic { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* =========================================
           新增：导出图片专用样式 (隐藏在屏幕外)
           ========================================= */
        #export-container {
            position: absolute;
            top: -9999px; /* 藏在屏幕外，不影响可视区域 */
            left: 0;
            width: 800px; /* 固定宽度，保证截图排版不乱 */
            background: #0a0a0a;
            color: #d4af37;
            padding: 50px;
            box-sizing: border-box;
            border: 2px solid #d4af37;
            font-family: 'Times New Roman', 'Noto Serif SC', 'Songti SC', serif;
            z-index: -100;
        }
        .export-header { text-align: center; font-size: 36px; letter-spacing: 12px; margin-bottom: 30px; border-bottom: 1px solid rgba(212, 175, 55, 0.4); padding-bottom: 20px; font-weight: bold;}
        .export-section { margin-bottom: 30px; }
        .export-label { font-size: 14px; color: #888; letter-spacing: 3px; margin-bottom: 12px; text-transform: uppercase; }
        .export-query { font-size: 22px; color: #fff; font-style: italic; }
        .export-cards { display: flex; gap: 20px; margin-top: 15px; }
        .export-card-item { flex: 1; background: rgba(255, 255, 255, 0.05); padding: 20px 15px; border: 1px solid rgba(212, 175, 55, 0.3); text-align: center; border-radius: 8px;}
        .export-card-title { font-size: 18px; color: #fff; font-weight: bold; margin-bottom: 8px; }
        .export-card-rev { font-size: 14px; color: #ff3333; }
        .export-reading { font-size: 20px; color: #eee; line-height: 2.0; margin-top: 20px; white-space: pre-wrap; text-align: justify;}
        .export-footer { text-align: center; margin-top: 40px; font-size: 12px; color: #666; letter-spacing: 4px; border-top: 1px solid rgba(212, 175, 55, 0.2); padding-top: 20px;}

        /* 新增下载按钮样式 */
        #download-btn {
            background: rgba(212, 175, 55, 0.1); border: 1px solid #d4af37; color: #d4af37;
            padding: 12px 40px; font-size: 13px; letter-spacing: 4px; border-radius: 50px;
            cursor: pointer; font-family: inherit; transition: 0.4s; backdrop-filter: blur(5px);
            display: none; /* 初始隐藏 */
        }
        #download-btn:hover { background: #d4af37; color: #000; box-shadow: 0 0 25px rgba(212, 175, 55, 0.6); }

        @media (max-width: 768px) {
            h1 { font-size: 42px; letter-spacing: 8px; }
            h2 { font-size: 10px; letter-spacing: 4px; }
            .options-row { flex-direction: column; gap: 15px; }
            .choice-btn { width: 160px; }
            #axis-markers::before { top: 15%; }
            #axis-markers::after { top: calc(15% + 35px); }
            .bottom-marker { bottom: 18%; }
            #history-container { top: 10px; right: 50%; transform: translateX(50%); height: 70px; gap: 10px; }
            .history-slot { width: 40px; height: 65px; }
            .history-name { font-size: 6px; }
            #hud-center { bottom: 14%; }
            #status-text { font-size: 10px; letter-spacing: 2px; }
            #credits { text-align: center; right: 0; width: 100%; bottom: 10px; font-size: 8px; }
            #final-text-container { top: 47%; flex-direction: column; align-items: center; max-height: 40vh; overflow-y: auto; gap: 10px; }
            .final-card-label { width: 100%; max-width: 300px; }
            #oracle-overlay { font-size: 14px; width: 90%; }
        }
    </style>

    <script src="https://cdn.bootcdn.net/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>
    <div id="loader"></div>

    <audio id="bgm-intro" loop preload="auto"><source src="./audio/bgm1.mp3" type="audio/mpeg"></audio>
    <audio id="bgm-final" loop preload="auto"><source src="./audio/bgm2.mp3" type="audio/mpeg"></audio>

    <div id="music-control" onclick="toggleMusic()">
        <div class="music-icon">🎵</div>
        <div class="music-line"></div>
    </div>

    <div id="start-screen">
        <div class="title-group">
            <h1>NEO TAROT</h1>
            <h2 id="subtitle">THE CYBER ARCANUM</h2>
        </div>

        <div class="api-config-panel">
            <div class="api-config-title">🔮 <span id="api-config-label">API Configuration</span></div>
            <select id="api-provider" class="api-provider-select" onchange="onProviderChange()">
                <option value="">-- Select / 选择 --</option>
                <option value="openai">OpenAI (GPT-4/GPT-3.5)</option>
                <option value="deepseek">DeepSeek</option>
                <option value="gemini">Google Gemini</option>
                <option value="claude">Anthropic Claude</option>
                <option value="qwen">Alibaba Qwen</option>
                <option value="moonshot">Moonshot (Kimi)</option>
                <option value="zhipu">Zhipu (GLM)</option>
            </select>
            <input type="password" id="api-key-input" class="api-key-input" placeholder="Enter API Key..." oninput="onApiKeyInput()">
            <div id="api-status" class="api-status"></div>
            <button class="skip-api-btn" onclick="skipApiConfig()">Skip & use local reading</button>
        </div>

        <div class="options-container">
            <div class="options-row">
                <div class="option-group">
                    <div class="option-label" id="lbl-language">Language / 语言</div>
                    <button class="choice-btn active" onclick="setLang('en')" id="btn-en">English</button>
                    <button class="choice-btn" onclick="setLang('zh')" id="btn-zh">中文</button>
                </div>
                <div class="option-group">
                    <div class="option-label" id="lbl-input">Input / 操控</div>
                    <button class="choice-btn active" onclick="setInput('hand')" id="btn-hand">Hand Gesture ✋</button>
                    <button class="choice-btn" onclick="setInput('mouse')" id="btn-mouse">Mouse / Touch 🖱️</button>
                </div>
            </div>
        </div>

        <button id="enter-btn" onclick="enterExperience()">ENTER</button>
    </div>

    <div id="input-screen" style="display: none;">
        <div class="input-card">
            <div class="input-decoration">✦</div>
            <h2 id="input-prompt">CONSULT THE VOID</h2>
            <textarea id="user-question" rows="1" maxlength="50"></textarea>
            <button id="confirm-question-btn" onclick="submitQuestion()">INITIATE</button>
        </div>
    </div>

    <div id="ui-layer">
        <div id="axis-markers"><div class="bottom-marker"></div></div>
        <div id="history-container"></div>
        <div id="final-text-container"></div>
        <div id="oracle-overlay"></div>
        <div id="end-ui">
            <button id="view-reading-btn" onclick="enterStarryVoid()">REVEAL DESTINY</button>
            <div style="display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;">
                <button id="download-btn" onclick="downloadResult()">保存神谕 (SAVE IMAGE)</button>
                <button id="restart-btn" onclick="location.reload()" style="display:none">RESTART RITUAL</button>
            </div>
        </div>
        
        <div id="export-container">
            <div class="export-header">NEO TAROT</div>
            <div class="export-section">
                <div class="export-label">Seeker's Query / 心中所问</div>
                <div class="export-query" id="export-query-text"></div>
            </div>
            <div class="export-section">
                <div class="export-label">The Cards / 命运之牌</div>
                <div class="export-cards" id="export-cards-container"></div>
            </div>
            <div class="export-section">
                <div class="export-label">The Oracle / 星辰指引</div>

        starPos[i*3] = r * Math.sin(phi) * Math.cos(theta);
        starPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
        starPos[i*3+2] = r * Math.cos(phi);
    }

    shape.lineTo(w, h - r); shape.quadraticCurveTo(w, h, w - r, h);
    shape.lineTo(-w + r, h); shape.quadraticCurveTo(-w, h, -w, h - r);
    shape.lineTo(-w, -h + r); shape.quadraticCurveTo(-w, -h, -w + r, -h);
    const faceGeo = new THREE.ShapeGeometry(shape);

    function fixUVs(geometry) {
        const posAttribute = geometry.attributes.position;
        const uvAttribute = geometry.attributes.uv;
        for (let i = 0; i < posAttribute.count; i++) {
            uvAttribute.setXY(i, (posAttribute.getX(i) / CARD_W) + 0.5, (posAttribute.getY(i) / CARD_H) + 0.5);
        }
        uvAttribute.needsUpdate = true;
    }
    fixUVs(faceGeo);
    const edgeMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.6, metalness: 0.1 });

    function createCardMesh(data, index, total) {
        const group = new THREE.Group();
        const texFront = texLoader.load(data.url);
        texFront.anisotropy = renderer.capabilities.getMaxAnisotropy();
        texFront.center.set(0.5, 0.5);

        const meshBack = new THREE.Mesh(faceGeo, new THREE.MeshStandardMaterial({ map: texBackGlobal, roughness: 0.6 }));
        meshBack.position.z = 0.005;
        const meshFront = new THREE.Mesh(faceGeo, new THREE.MeshStandardMaterial({ map: texFront, roughness: 0.6 }));
        meshFront.rotation.y = Math.PI; meshFront.position.z = -0.005;
        const meshFiller = new THREE.Mesh(faceGeo, edgeMat);
        meshFiller.scale.set(0.995, 0.995, 1);

        group.add(meshBack, meshFront, meshFiller);
        const theta = index * ((Math.PI * 2) / total);
        group.position.set(RADIUS * Math.sin(theta), 0, -RADIUS * Math.cos(theta));
        group.lookAt(0, 0, 0);
        group.userData = { id: data.id, rawData: data, state: 'IDLE', theta: theta, isChosen: false };
        return group;
    }

    let handState = 'OPEN', handX = 0, ringRotation = 0, activeCard = null, centerCard = null;

    function initMouseListeners() {
        window.addEventListener('mousemove', e => { handX = (e.clientX / window.innerWidth) * 2 - 1; });
        window.addEventListener('mousedown', e => {
            if (e.button !== 0) return;
            if (Math.abs(handX) < 0.2 && !(isInertia && Math.abs(touchVelocity) > GRAB_THRESHOLD)) {
                if (isInertia) { isInertia = false; touchVelocity = 0; snapToGrid(); }
                handState = 'PINCH';
            }
            updateCursorIcon();
        });
        window.addEventListener('mouseup', () => { handState = 'OPEN'; updateCursorIcon(); });
        window.addEventListener('keydown', e => { if (e.code === 'Space') handState = 'FIST'; updateCursorIcon(); });
        window.addEventListener('keyup', e => {
            if (e.code === 'Space') handState = (handState === 'FIST') ? 'PINCH' : 'OPEN';
            updateCursorIcon();
        });
    }

    function initTouchListeners() {
        const container = document.getElementById('canvas-container');
        container.addEventListener('touchstart', e => {
            if (controlMode === 'hand') return;
            isDragging = true; isInertia = false; touchVelocity = 0;
            touchStartX = lastTouchX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            dragDirection = null; pullProgress = 0;
        }, { passive: false });

        container.addEventListener('touchmove', e => {
            if (controlMode === 'hand' || !isDragging) return;
            e.preventDefault();
            const touch = e.touches[0];
            const dx = touch.clientX - touchStartX, dy = touch.clientY - touchStartY;

            if (!dragDirection && (Math.abs(dx) > 10 || Math.abs(dy) > 10)) {
                if (Math.abs(dx) > Math.abs(dy)) dragDirection = 'X';
                else if (dy > 0 && centerCard && selectionCount < MAX_SELECTION) {
                    dragDirection = 'Y'; isInertia = false; touchVelocity = 0; snapToGrid();
                    if (!activeCard) selectCard(centerCard);
                }
            }
            if (dragDirection === 'X') {
                const currentX = touch.clientX;
                touchVelocity = (currentX - lastTouchX) * 0.005; lastTouchX = currentX;
                ringRotation += touchVelocity * 3.0; deckGroup.rotation.y = ringRotation;
            } else if (dragDirection === 'Y') {
                pullProgress = Math.min(Math.max(dy / PULL_THRESHOLD, 0), 1.2);
                if (activeCard) {
                    activeCard.position.set(0, THREE.MathUtils.lerp(0, 0, pullProgress * 0.5), THREE.MathUtils.lerp(-RADIUS, isMobile ? -1.8 : -1.5, pullProgress));
                    activeCard.rotation.x = pullProgress * 0.5;
                    activeCard.userData.isManualDragging = true;
                }
            }
        }, { passive: false });

        container.addEventListener('touchend', () => {
            if (controlMode === 'hand') return;
            isDragging = false;
            if (dragDirection === 'X') {
                if (Math.abs(touchVelocity) > 0.002) isInertia = true; else snapToGrid();
            } else if (dragDirection === 'Y') {
                if (pullProgress > 0.8 && activeCard) revealCard(activeCard);
                else if (activeCard) returnCard(activeCard);
                pullProgress = 0;
            }
            dragDirection = null;
        });
    }

    function initHUDListeners() {
        const hud = document.getElementById('hud-center');
        const onPress = e => {
            if (!isMobile || (isInertia && Math.abs(touchVelocity) > GRAB_THRESHOLD) || selectionCount >= MAX_SELECTION) return;
            e.preventDefault(); e.stopPropagation();
            isInertia = false; touchVelocity = 0; isDragging = false; snapToGrid();
            handState = 'PINCH'; updateCursorIcon();
        };
        const onRelease = e => {
            if (!isMobile) return;
            e.preventDefault(); handState = 'OPEN'; updateCursorIcon(); interactionLock = false;
        };
        hud.addEventListener('touchstart', onPress, { passive: false });
        hud.addEventListener('touchend', onRelease, { passive: false });
        hud.addEventListener('touchcancel', onRelease, { passive: false });
    }

    function toggleGuides(show) {
        document.getElementById('axis-markers').style.opacity = show ? '0.4' : '0';
        document.getElementById('hud-center').style.opacity = show ? '1' : '0';
        document.getElementById('hud-center').style.pointerEvents = show ? 'auto' : 'none';
    }

    // --- Music System ---
    let currentAudioId = null, isGlobalMuted = false;
    function switchMusic(newId) {
        ['bgm-intro', 'bgm-final'].forEach(id => document.getElementById(id).pause());
        if (!newId) { currentAudioId = null; updateMusicBtnState(false); return; }
        currentAudioId = newId;
        const audio = document.getElementById(newId);
        audio.currentTime = 0; audio.volume = 0.5;
        if (!isGlobalMuted) { audio.play().catch(()=>{}); updateMusicBtnState(true); }
        else updateMusicBtnState(false);
    }
    function toggleMusic() {
        isGlobalMuted = !isGlobalMuted;
        if (currentAudioId) {
            const a = document.getElementById(currentAudioId);
            isGlobalMuted ? a.pause() : a.play();
            updateMusicBtnState(!isGlobalMuted);
        }
    }
    function updateMusicBtnState(isPlaying) {
        document.getElementById('music-control').classList.toggle('muted', !isPlaying);
    }

    function updateCursorIcon() {
        document.getElementById('gesture-icon').innerText = handState === 'FIST' ? '✊' : (handState === 'PINCH' ? '🤏' : (isMobile ? '👆' : '🖱️'));
    }
    function updateStatusText() {
        const el = document.getElementById('status-text');
        if (isRitualComplete) el.innerText = TEXTS[currentLang].statusDone;
        else if (activeCard && activeCard.userData.state === 'SELECTED') el.innerText = controlMode === 'hand' ? TEXTS[currentLang].statusFist : TEXTS[currentLang].statusSpace;
        else if (activeCard && activeCard.userData.state === 'REVEALING') el.innerText = TEXTS[currentLang].statusReveal;
        else el.innerText = controlMode === 'hand' ? TEXTS[currentLang].statusWave : (isMobile ? TEXTS[currentLang].statusTouch : TEXTS[currentLang].statusMouse);
    }

    function getAxisCard() {
        if (activeCard) return activeCard;
        let closestCard = null, minAbsX = Infinity;
        cardObjects.forEach(card => {
            if (card.userData.isChosen) return;
            const wp = new THREE.Vector3(); card.getWorldPosition(wp);
            if (wp.z < 0 && Math.abs(wp.x) < minAbsX) { minAbsX = Math.abs(wp.x); closestCard = card; }
        });
        return closestCard;
    }

    let isHandRotating = false;
    function handleInput() {
        if (!isStarted || isRitualComplete || isCoolingDown) { if(isRitualComplete) animateFinalFormation(); return; }

        if (!activeCard) {
            if (isInertia) {
                ringRotation += touchVelocity * 15; touchVelocity *= FRICTION;
                if (Math.abs(touchVelocity) < 0.0005) { isInertia = false; touchVelocity = 0; snapToGrid(); }
            }
            if (!isDragging && !isInertia && handState === 'OPEN') {
                const deadZone = 0.15, speed = isMobile ? 0.015 : 0.02;
                if (Math.abs(handX) > deadZone) { ringRotation += (handX - Math.sign(handX) * deadZone) * speed; isHandRotating = true; }
                else if (isHandRotating) { snapToGrid(); isHandRotating = false; }
            }
            deckGroup.rotation.y = isDragging && dragDirection === 'X' ? ringRotation : THREE.MathUtils.lerp(deckGroup.rotation.y, ringRotation, 0.1);
        }

        centerCard = getAxisCard();
        if (!isMobile && !isDragging) document.body.classList.toggle('can-grab', Math.abs(handX) < 0.2 && centerCard && !isInertia);

        if (handState === 'PINCH' && centerCard && !activeCard && !isDragging && !isInertia && dragDirection !== 'Y') selectCard(centerCard);

        if (activeCard && dragDirection !== 'Y') {
            activeCard.position.lerp(new THREE.Vector3(0, isMobile ? 0.8 : 0, isMobile ? -3.5 : -2.2), 0.1);
            if (activeCard.userData.state === 'SELECTED') {
                activeCard.quaternion.slerp(new THREE.Quaternion().setFromEuler(new THREE.Euler(0, 0, 0)), 0.1);
                if (controlMode === 'hand') {
                    if (handState === 'FIST') revealCard(activeCard);
                    else if (handState === 'OPEN') returnCard(activeCard);
                } else {
                    if (handState === 'PINCH') {
                        if (!activeCard.userData.revealTimer) activeCard.userData.revealTimer = Date.now();
                        if (Date.now() - activeCard.userData.revealTimer > 500) revealCard(activeCard);
                    } else if (handState === 'OPEN') {
                        activeCard.userData.revealTimer = null; returnCard(activeCard);
                    }
                }
            }
        } else if (!activeCard) updateStatusText();
    }

    function snapToGrid() {
        if (deckList.length === 0) return;
        const step = (Math.PI * 2) / deckList.length;
        ringRotation = Math.round(ringRotation / step) * step;
        centerCard = getAxisCard();
    }

    function selectCard(card) {
        if (selectionCount >= MAX_SELECTION) return;
        toggleGuides(false);
        activeCard = card; card.userData.state = 'SELECTED'; card.userData.revealTimer = Date.now();
        scene.attach(card);
    }

    function returnCard(card) { deckGroup.attach(card); card.userData.state = 'RETURNING'; activeCard = null; }

    function updateReturningCards() {
        cardObjects.forEach(card => {
            if (card.userData.state === 'RETURNING') {
                const targetPos = new THREE.Vector3(RADIUS * Math.sin(card.userData.theta), 0, -RADIUS * Math.cos(card.userData.theta));
                card.position.lerp(targetPos, 0.08);
                const dummy = new THREE.Object3D(); dummy.position.copy(card.position); dummy.lookAt(0, 0, 0);
                card.quaternion.slerp(dummy.quaternion, 0.08);
                if (card.position.distanceTo(targetPos) < 0.05) {
                    deckGroup.attach(card); card.position.copy(targetPos); card.lookAt(0, 0, 0);
                    card.userData.state = 'IDLE'; isCoolingDown = true;
                    setTimeout(() => {
                        activeCard = null; isCoolingDown = false;
                        if (!isRitualComplete && selectionCount < MAX_SELECTION) toggleGuides(true);
                    }, COOLDOWN_TIME);
                }
            }
        });
    }

    function revealCard(card) {
        if (card.userData.state === 'REVEALING') return;
        card.userData.state = 'REVEALING'; updateStatusText();
        const isReversed = Math.random() < 0.5; card.userData.isReversed = isReversed;
        const startQ = card.quaternion.clone(), targetQ = new THREE.Quaternion().setFromEuler(new THREE.Euler(0, Math.PI, isReversed ? Math.PI : 0));
        let p = 0;
        function animateFlip() {
            p += 0.03; card.quaternion.slerpQuaternions(startQ, targetQ, p);
            if (p < 1) requestAnimationFrame(animateFlip);
            else {
                card.rotation.set(0, Math.PI, isReversed ? Math.PI : 0);
                document.getElementById('status-text').innerText = card.userData.rawData[currentLang].name.toUpperCase();
                setTimeout(() => dissolve(card, isReversed), 2000);
            }
        }
        animateFlip();
    }

    function dissolve(card, isReversed) {
        spawnParticles(card.position); selectionCount++;
        addToHistory(card.userData.rawData, isReversed);
        card.visible = false; card.userData.isChosen = true; chosen3DMeshes.push(card);
        isCoolingDown = true;
        setTimeout(() => {
            activeCard = null; isCoolingDown = false;
            if (selectionCount >= MAX_SELECTION) startEndRitual();
            else toggleGuides(true);
        }, COOLDOWN_TIME);
    }

    function startEndRitual() {
        isRitualComplete = true; updateStatusText();
        document.getElementById('history-container').style.opacity = 0; document.getElementById('hud-center').style.opacity = 0;
        setTimeout(() => {
            document.getElementById('end-ui').style.opacity = 1; document.getElementById('end-ui').style.pointerEvents = 'auto';
            document.getElementById('credits').style.opacity = 1;
            document.getElementById('view-reading-btn').style.display = 'block';
            document.getElementById('view-reading-btn').innerText = currentLang === 'zh' ? "揭示指引" : "REVEAL FATE";
        }, 3500);

        cardObjects.forEach(c => { if (!c.userData.isChosen) c.userData.dropSpeed = 0.05 + Math.random() * 0.1; });
        chosen3DMeshes.forEach((card, i) => {
            card.visible = true; scene.attach(card); card.position.set(4 + i * 0.5, 3, -4); card.scale.set(0.2, 0.2, 0.2);
            card.userData.finalTargetPos = new THREE.Vector3((i - 1) * (window.innerHeight > window.innerWidth ? 1.8 : 3.0), window.innerHeight > window.innerWidth ? 3.0 : 0, window.innerHeight > window.innerWidth ? -7.0 : -6.0);
            card.userData.finalTargetScale = 0.8; card.userData.animProgress = 0; card.userData.animDelay = i * 30;
        });

        const textCon = document.getElementById('final-text-container');
        chosen3DMeshes.forEach(c => {
            const div = document.createElement('div'); div.className = 'final-card-label';
            const data = c.userData.rawData[currentLang];
            div.innerHTML = `<div class="final-name">${data.name}${c.userData.isReversed ? ` (${TEXTS[currentLang].rev})` : ""}</div><div class="final-meaning">${data.meaning}</div>`;
            textCon.appendChild(div);
        });
        setTimeout(() => textCon.style.opacity = 1, 2000);
    }

    // ==========================================
    // 5. 调用重构后的动态 API
    // ==========================================
    async function enterStarryVoid() {
        switchMusic('bgm-final');
        document.getElementById('view-reading-btn').style.display = 'none';
        document.getElementById('final-text-container').style.opacity = 0;
        chosen3DMeshes.concat(cardObjects).forEach(m => m.visible = false);

        const overlay = document.getElementById('oracle-overlay');
        overlay.innerHTML = `<div style="opacity:0.7; animation: pulse 1.5s infinite;">${currentLang === 'zh' ? "正在与星辰连接..." : "Connecting with the stars..."}</div>`;

        const onTypingComplete = () => {
            const rBtn = document.getElementById('restart-btn');
            const dBtn = document.getElementById('download-btn');
            rBtn.style.display = 'block'; rBtn.style.opacity = 0;
            dBtn.style.display = 'block'; dBtn.style.opacity = 0;
            let op = 0; 
            const ft = setInterval(() => { 
                if (op >= 1) clearInterval(ft); 
                rBtn.style.opacity = op; 
                dBtn.style.opacity = op; 
                op += 0.05; 
            }, 30);
        };

        // 判断是否走 API 逻辑
        if (!useLocalMode && currentApiConfig.provider && currentApiConfig.apiKey) {
            try {
                // 提取需要的格式传递给 buildMessages
                const cardsData = chosen3DMeshes.map(c => ({ id: c.userData.id, isReversed: c.userData.isReversed }));
                const apiText = await callTarotAPI(cardsData);
                typeWriter(apiText, overlay, onTypingComplete);
            } catch (e) {
                console.error("API Error:", e);
                if (DEBUG_MODE) alert(`API 调用失败: ${e.message}\n已降级到本地文案。`);
                typeWriter(generateReadingText(), overlay, onTypingComplete);
            }
        } else {
            setTimeout(() => typeWriter(generateReadingText(), overlay, onTypingComplete), 1500);
        }
    }

    async function callTarotAPI(cards) {
        const messages = buildMessages(userQuestionText, cards, currentLang);
        const config = API_PROVIDERS[currentApiConfig.provider];
        let url = config.endpoint;
        
        // 使用代理处理跨域 (如果需要直接走官方且会跨域的话)
        //if (currentApiConfig.provider !== 'custom') {
        //    url = PROXY_BASE_URL + encodeURIComponent(url);
        //}

        const headers = { 'Content-Type': 'application/json' };
        if (config.headerKey) {
            headers[config.headerKey] = config.headerFormat.replace('{key}', currentApiConfig.apiKey);
        }

        let body = {
            model: config.model,
            messages: messages,
            temperature: 0.7,
            max_tokens: 500
        };

        // Claude 需要把 system 提出来
        if (currentApiConfig.provider === 'claude') {
            body.system = messages.find(m => m.role === 'system')?.content || "";
            body.messages = messages.filter(m => m.role !== 'system');
            headers['anthropic-version'] = '2023-06-01';
        }

        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 20000); // 20s Timeout

        const response = await fetch(url, { method: 'POST', headers: headers, body: JSON.stringify(body), signal: controller.signal });
        clearTimeout(timeoutId);

        if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${await response.text()}`);
        }

        const data = await response.json();
        
        // 兼容提取各类模型的回复文本
        if (data.choices && data.choices[0].message) return data.choices[0].message.content; // OpenAI / Deepseek
        if (data.content && data.content[0]) return data.content[0].text; // Claude
        if (data.candidates && data.candidates[0]) return data.candidates[0].content.parts[0].text; // Gemini
        
        return JSON.stringify(data);
    }

    function generateReadingText() {
        const m = chosen3DMeshes.map(c => c.userData.rawData[currentLang].meaning);
        return currentLang === 'zh' 
            ? `命运的轨迹已在星辰中显现...<br><br>过去，你经历了 ${m[0]}。<br>此刻，你需要专注于 ${m[1]} 的力量。<br>而未来，${m[2]} 将会是你的指引。<br><br>相信直觉，拥抱变化。`
            : `The stars have aligned...<br><br>In the past, you walked through ${m[0]}.<br>Presently, focus on ${m[1]}.<br>For the future, let ${m[2]} be your guide.<br><br>Trust your intuition.`;
    }

    function typeWriter(htmlText, element, callback) {
        element.innerHTML = "";
        const plainText = htmlText.replace(/<br>/g, '\n');
        let i = 0;
        function type() {
            if (i < plainText.length) {
                const char = plainText.charAt(i);
                element.innerHTML += (char === '\n') ? '<br>' : char;
                i++; setTimeout(type, 50);
            } else if (callback) callback();
        }
        type();
    }

    function animateFinalFormation() {
        cardObjects.forEach(c => { if (!c.userData.isChosen && c.position.y > -10) { c.position.y -= c.userData.dropSpeed; c.rotation.x += 0.05; } });
        chosen3DMeshes.forEach(card => {
            if (card.userData.animDelay > 0) { card.userData.animDelay--; return; }
            if (card.userData.animProgress < 1) {
                card.userData.animProgress += 0.015; const t = card.userData.animProgress, easeT = t < .5 ? 2*t*t : -1+(4-2*t)*t;
                card.position.lerp(card.userData.finalTargetPos, 0.05);
                const s = THREE.MathUtils.lerp(0.2, card.userData.finalTargetScale, easeT); card.scale.set(s, s, s);
                card.rotation.set(0, Math.PI, card.userData.isReversed ? Math.PI : 0);
            }
        });
    }

    function addToHistory(rawData, isRev) {
        const slot = document.createElement('div'); slot.className = `history-slot ${isRev ? 'is-reversed' : ''}`;
        slot.innerHTML = `<img src="${rawData.url}"><div class="history-info"><div class="history-name">${rawData[currentLang].name}</div><div class="history-rev">${TEXTS[currentLang].rev}</div></div>`;
        document.getElementById('history-container').appendChild(slot);
    }

    const particles = [];
    function spawnParticles(pos) {
        const pArr = new Float32Array(500 * 3), vArr = new Float32Array(500 * 3);
        for (let i = 0; i < 500; i++) {
            pArr[i*3] = pos.x + (Math.random() - 0.5) * CARD_W; pArr[i*3+1] = pos.y + (Math.random() - 0.5) * CARD_H; pArr[i*3+2] = pos.z;
            vArr[i*3] = (Math.random() - 0.5) * 0.02; vArr[i*3+1] = Math.random() * 0.03; vArr[i*3+2] = (Math.random() - 0.5) * 0.02;
        }
        const geo = new THREE.BufferGeometry(); geo.setAttribute('position', new THREE.BufferAttribute(pArr, 3));
        const sys = new THREE.Points(geo, new THREE.PointsMaterial({ color: GOLD_COLOR, size: 0.04, transparent: true }));
        sys.userData = { life: 1.0, vels: vArr }; scene.add(sys); particles.push(sys);
    }

    function updateParticles() {
        for (let i = particles.length - 1; i >= 0; i--) {
            const sys = particles[i], p = sys.geometry.attributes.position.array, v = sys.userData.vels;
            sys.userData.life -= 0.02;
            for (let j = 0; j < p.length / 3; j++) { p[j*3] += v[j*3]; p[j*3+1] += v[j*3+1]; p[j*3+2] += v[j*3+2]; }
            sys.geometry.attributes.position.needsUpdate = true; sys.material.opacity = sys.userData.life;
            if (sys.userData.life <= 0) { scene.remove(sys); particles.splice(i, 1); }
        }
    }

    function initCamera() {
        const videoElem = document.getElementById('video-feed');
        const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.5 });
        hands.onResults(res => {
            if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
                const lm = res.multiHandLandmarks[0];
                handX += ((1 - lm[8].x) * 2 - 1 - handX) * 0.2;
                const pinch = Math.hypot(lm[8].x - lm[4].x, lm[8].y - lm[4].y), fist = lm[12].y > lm[9].y && lm[16].y > lm[13].y;
                handState = fist ? 'FIST' : (pinch < 0.05 ? 'PINCH' : 'OPEN');
                if (!isRitualComplete) document.getElementById('gesture-icon').innerText = handState === 'FIST' ? '✊' : (handState === 'PINCH' ? '👌' : '✋');
            }
        });
        new Camera(videoElem, { onFrame: async () => { await hands.send({ image: videoElem }) }, width: 320, height: 240 }).start();
    }

    function updateCameraPos() {
        camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.position.set(0, camera.aspect < 1 ? 1 : 0, camera.aspect < 1 ? 1 : 0);
    }
    window.onresize = updateCameraPos;

    function updateCardVisuals() {
        cardObjects.forEach(card => {
            if (card.userData.isChosen) return;
            const isTarget = (activeCard && card === activeCard) || (!activeCard && card === centerCard);
            const targetColor = isTarget ? new THREE.Color(0xffffff) : new THREE.Color(0x333333);
            const targetEmissive = isTarget ? new THREE.Color(0x222222) : new THREE.Color(0x000000);
            card.children.forEach(mesh => {
                if (mesh.isMesh && mesh.material) {
                    mesh.material.color.lerp(targetColor, 0.1);
                    if (mesh.material.emissive) mesh.material.emissive.lerp(targetEmissive, 0.1);
                }
            });
        });
    }

    // ==========================================
    // 新增：生成并下载结果图片逻辑
    // ==========================================
    async function downloadResult() {
        const btn = document.getElementById('download-btn');
        const originalText = btn.innerText;
        
        // 1. 改变按钮状态，防止用户狂点
        btn.innerText = currentLang === 'zh' ? "正在绘制星图..." : "Generating...";
        btn.style.pointerEvents = 'none';

        try {
            // 2. 将数据填充到隐藏的截图卡片中
            document.getElementById('export-query-text').innerText = userQuestionText || (currentLang === 'zh' ? "我的命运指引" : "My general destiny");
            
            // 填充三张卡牌的排版
            const cardsContainer = document.getElementById('export-cards-container');
            cardsContainer.innerHTML = '';
            const posNames = currentLang === 'zh' ? ['过去', '现在', '未来'] : ['Past', 'Present', 'Future'];
            
            chosen3DMeshes.forEach((c, i) => {
                const data = c.userData.rawData[currentLang];
                const isRev = c.userData.isReversed;
                const revText = isRev ? (currentLang === 'zh' ? '逆位 (Reversed)' : 'Reversed') : (currentLang === 'zh' ? '正位 (Upright)' : 'Upright');
                const revColor = isRev ? '#ff6b6b' : '#a0a0a0';
                
                cardsContainer.innerHTML += `
                    <div class="export-card-item">
                        <div style="font-size:13px;color:#d4af37;margin-bottom:10px;">✦ ${posNames[i]} ✦</div>
                        <div class="export-card-title">${data.name}</div>
                        <div style="font-size:12px; margin-top:6px; color:${revColor};">${revText}</div>
                    </div>
                `;
            });

            // 填充最终的解读文本 (获取打字机里的纯文本，保留换行)
            const cleanText = document.getElementById('oracle-overlay').innerText;
            document.getElementById('export-reading-text').innerText = cleanText;

            // 3. 核心：调用 html2canvas 对隐藏容器进行截图
            const exportDiv = document.getElementById('export-container');
            const canvas = await html2canvas(exportDiv, {
                backgroundColor: '#0a0a0a',
                scale: 2, // 2倍缩放保证导出图片的高清视网膜画质
                useCORS: true,
                logging: false
            });

            // 4. 将 Canvas 转换为图片并触发下载
            const imageURL = canvas.toDataURL("image/png");
            const link = document.createElement('a');
            
            // 生成带时间戳的文件名
            const date = new Date();
            const timeStr = `${date.getMonth()+1}${date.getDate()}_${date.getHours()}${date.getMinutes()}`;
            link.download = `NeoTarot_Reading_${timeStr}.png`;
            
            link.href = imageURL;
            link.click();
            
        } catch (err) {
            console.error("生成图片失败:", err);
            alert(currentLang === 'zh' ? "图片生成失败，请重试。" : "Failed to generate image.");
        } finally {
            // 5. 恢复按钮状态
            btn.innerText = originalText;
            btn.style.pointerEvents = 'auto';
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        starSystem.rotation.y += 0.0002;
        if (isStarted) { handleInput(); updateReturningCards(); updateParticles(); updateCardVisuals(); }
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
